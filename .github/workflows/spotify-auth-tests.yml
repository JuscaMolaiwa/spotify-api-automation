name: Spotify Auth API Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Runs daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
  # Allows manual trigger from the GitHub Actions UI

jobs:
  auth-tests:
    name: Run Authentication Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.24.0/allure-2.24.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.24.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/local/bin/allure
          allure --version

      - name: Resolve dependencies
        run: mvn dependency:resolve

      - name: Run Authentication Tests
        env:
          CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          mvn clean test \
            -Dtest=AuthenticationTest \
            -DCLIENT_ID=$CLIENT_ID \
            -DCLIENT_SECRET=$CLIENT_SECRET \
            -Dsurefire.suiteXmlFiles=src/test/resources/testng.xml

      - name: Generate Single-File Allure Report
        if: always()
        run: allure generate target/allure-results --clean --single-file -o target/allure-report

      - name: Upload Single-File Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/allure-report/index.html
          retention-days: 7

      - name: Upload Surefire Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 7